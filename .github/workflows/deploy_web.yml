name: Deploy Web

# Lightweight workflow to deploy the web app without re-running the data pipeline.
# Uses processed data from the last successful pipeline run.

on:
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download processed data from last successful pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --workflow=parquet_pipeline.yml \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: No successful pipeline run found"
            exit 1
          fi
          echo "Downloading processed data from run $RUN_ID"
          gh run download "$RUN_ID" --name processed-data --dir data/processed
          echo "Files downloaded:"
          ls -lh data/processed/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy data to web public directory
        run: |
          mkdir -p web/public/data
          cp -r data/processed/* web/public/data/

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
