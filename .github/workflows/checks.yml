name: Checks

# Consolidated code-quality gate. Runs the same shared ci/ scripts as the local
# .githooks hooks, so the same rules are enforced before commit and again in CI:
#   - repo-checks: LOC cap, charset (emoji/decoration), AI-attribution.
#   - web-lint:    eslint (--max-warnings 0), only when web/ changed.
#   - python-lint: ruff check + ruff format --check, only when scripts/ changed.
# web-lint / python-lint always run as jobs (so they always report a status and
# stay safe to mark "required"), but skip their costly steps when no relevant
# files changed. repo-checks is dependency-free and always runs in full.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      py: ${{ steps.detect.outputs.py }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"
          else
            base="$PUSH_BEFORE"; head="$PUSH_AFTER"
          fi
          # No usable base (new branch / unknown): scan everything.
          if [ -z "$base" ] || echo "$base" | grep -qE '^0+$'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "py=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base" "$head")
          if echo "$changed" | grep -q '^web/'; then echo "web=true" >> "$GITHUB_OUTPUT"; else echo "web=false" >> "$GITHUB_OUTPUT"; fi
          if echo "$changed" | grep -q '^scripts/'; then echo "py=true" >> "$GITHUB_OUTPUT"; else echo "py=false" >> "$GITHUB_OUTPUT"; fi

  web-lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: needs.changes.outputs.web == 'true'

      - name: Set up Node.js
        if: needs.changes.outputs.web == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.web == 'true'
        working-directory: web
        run: npm ci

      - name: Lint
        if: needs.changes.outputs.web == 'true'
        working-directory: web
        run: npm run lint

  python-lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: needs.changes.outputs.py == 'true'

      - name: Install uv
        if: needs.changes.outputs.py == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: false

      - name: Install dependencies
        if: needs.changes.outputs.py == 'true'
        run: cd scripts && uv sync --frozen --extra dev

      - name: Ruff lint
        if: needs.changes.outputs.py == 'true'
        run: cd scripts && uv run --frozen --extra dev ruff check .

      - name: Ruff format check
        if: needs.changes.outputs.py == 'true'
        run: cd scripts && uv run --frozen --extra dev ruff format --check .

  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: LOC cap
        run: ci/loc-check.sh

      - name: Charset (emoji / decoration)
        run: ci/charset-check.sh

      - name: Attribution - commit messages
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            range="$PR_BASE..$PR_HEAD"
          elif [ -z "$PUSH_BEFORE" ] || echo "$PUSH_BEFORE" | grep -qE '^0+$'; then
            range="$PUSH_AFTER~1..$PUSH_AFTER"
          else
            range="$PUSH_BEFORE..$PUSH_AFTER"
          fi
          ci/commit-attribution-check.sh "$range"

      - name: Attribution - PR title and body
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          . ci/attribution-check.sh
          printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | ai_attribution_scan "PR title/body"
